# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

transient_prompt:
    template: >-
      <blue>at <default>{{ if .Segments.Path }}{{ .Segments.Path.Path }}{{ end }}
      <blue>@ <red>{{ if .Segments.Time }}{{ .Segments.Time.CurrentDate | date .Segments.Time.Format }}{{ end }}
      {{ if .Segments.ExecutionTime }}{{ if .Segments.ExecutionTime.FormattedMs }}<blue>in <red>{{ .Segments.ExecutionTime.FormattedMs }} {{ end }}{{ end }}<blue>><default>
    foreground: '#ffffff'
    background: transparent
upgrade:
    source: cdn
    interval: 168h
    auto: false
    notice: false
blocks:
    - type: prompt
      alignment: left
      newline: true
      segments:
        - template: ' {{ $host := split "." .HostName }}{{ $host._0 }} '
          background: '#0087ff'
          foreground: '#000000'
          powerline_symbol: "\ue0b0"
          type: session
          style: powerline
        - template: ' {{ .UserName }} '
          background: '#ff5733'
          foreground: '#ffffff'
          type: session
          style: powerline
          powerline_symbol: "\ue0b0"
          properties:
            style: full
        - type: python
          style: powerline
          powerline_symbol: "\ue0b0"
          background: "#906cff"
          foreground: "#100e23"
          template: " ŅłĄ {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }} "
          properties:
            fetch_version: false
        - type: command
          style: powerline
          powerline_symbol: "\ue0b0"
          background: "#7ebae4"
          foreground: "#100e23"
          template: " ŌØä {{ .Output }} "
          properties:
            command: "echo $PATH | awk 'BEGIN{RS=\":\"} /\\/nix\\/store\\//{sub(/\\/nix\\/store\\/[^-]*-/,\"\"); sub(/-[0-9].*/,\"\"); printf sep$0; sep=\",\"} END{if(sep)print \"\"}'"
    - type: prompt
      alignment: right
      segments:
        - properties:
            style: full
          template: ' {{ .Path }} '
          type: path
          style: diamond
          leading_diamond: "\ue0b2"
          background: "#8be9fd"
          foreground: "#100e23"
    - alignment: right
      #type: rprompt
      segments:
        - properties:
            style: full
          template: ' {{ .Path }}'
          foreground: '#56B6C2'
          type: path
          style: plain
        - properties:
            time_format: "15:04:05"
          foreground: '#007ACC'
          type: time
          style: plain
        - type: executiontime
          style: powerline
          powerline_symbol: Ņé░
          foreground: "#ffffff"
          background: "#8800dd"
          template: " <#fefefe>Ņ«ó</> {{ .FormattedMs }} "
          properties:
            threshold: 500
            style: austin
            always_enabled: true
    - type: prompt
      alignment: left
      newline: true
      segments:
        - template: Ńāä{{ .Jobs }}
          foreground: '#62ED8B'
          type: text
          style: plain
        - template: '{{ if eq .Code 0 }} Ō£ō {{ else }} ’äÖ {{ end }}'
          foreground: '#DCB977'
          type: status
          style: plain
          properties:
            always_enabled: true
        - template: Ō×£
          foreground: '#62ED8B'
          type: text
          style: plain
version: 3
final_space: true
