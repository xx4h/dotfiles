# Source shared config
source-file ~/.tmux.shared.conf

#-- Configure C-f as prefix/escape {
# set C-f as global prefix
set-option -g prefix C-f

# bind C-f as send-prefix
bind C-f send-prefix
# }

#-- other bindings
bind C-f last-window

# Reload binding (no tmux-sensible to provide this)
bind R source-file ~/.tmux-project.conf \; display "tmux-project reloaded"

#-- Single status line matching xx4h-slim window tab theme
set -g status on
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style 'bg=default fg=colour255'

# Left: session name
set -g status-left '#[fg=colour234,bg=colour148,bold] #S #[fg=colour148,bg=default]'
set -g status-left-length 30

# Right: time and hostname
set -g status-right '#[fg=colour39,bg=default]#[fg=colour0,bg=colour39] %H:%M #[fg=colour33,bg=colour39]#[fg=colour0,bg=colour33] #h '
set -g status-right-length 50

# Window tabs — matching xx4h-slim colours
# Active: bg=colour250 fg=colour0
setw -g window-status-current-format '#[fg=colour250,bg=default] #[bg=colour250,fg=colour0] #I#F  #W #[fg=colour250,bg=default] '
# Inactive: bg=colour240 fg=colour255
setw -g window-status-format '#[fg=colour240,bg=default] #[bg=colour240,fg=colour255] #I#{?window_flags,#F, } #[fg=colour240,bg=default] #[fg=colour255,bg=default] #W '
# Activity: bg=colour78 fg=colour0 / Bell: bg=colour197 fg=colour255
setw -g window-status-activity-style 'bg=colour78 fg=colour0'
setw -g window-status-bell-style 'bg=colour197 fg=colour255'

# -- configure tmux-continuum
set -g @continuum-restore 'on'

# -- configure tmux-resurrect, restore nvim sessions
set -g @resurrect-strategy-nvim 'session'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect with settings
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
