# Source shared config
source-file ~/.tmux.shared.conf

#-- Configure C-f as prefix/escape {
# set C-f as global prefix
set-option -g prefix C-f

# bind C-f as send-prefix
bind C-f send-prefix
# }

#-- other bindings
bind C-f last-window

# Reload binding (no tmux-sensible to provide this)
bind R source-file ~/.tmux-project.conf \; display "tmux-project reloaded"

# -- configure tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# -- configure tmux-resurrect, restore nvim sessions
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Per-project resurrect dir from $TMUX_PROJECT_DATA_DIR (exported by the `tp`
# shell helper). Must run BEFORE tmux-continuum is loaded so its auto-restore
# (which fires at server start) sees the right path.
run-shell '[ -n "$TMUX_PROJECT_DATA_DIR" ] && tmux set -g @resurrect-dir "$TMUX_PROJECT_DATA_DIR/resurrect"'

# Source plugins directly (TPM hardcodes ~/.tmux.conf, which would load the wrong theme)
run-shell '~/.tmux/plugins/tmux-sensible/sensible.tmux'

# Load tmux-powerline BEFORE continuum: powerline overwrites status-right
# wholesale at load time, so continuum must run after it to get its
# #(continuum_save.sh) interpolation prepended (otherwise no auto-saves).
run-shell 'tmux set-environment -g TMUX_POWERLINE_CONFIG_FILE "$HOME/.config/tmux-powerline/config-project.sh"'
run-shell '~/.tmux/plugins/tmux-powerline/main.tmux'

run-shell '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
run-shell '~/.tmux/plugins/tmux-continuum/continuum.tmux'
