# Source shared config
source-file ~/.tmux.shared.conf

#-- Configure C-f as prefix/escape {
# set C-f as global prefix
set-option -g prefix C-f

# bind C-f as send-prefix
bind C-f send-prefix
# }

#-- other bindings
bind C-f last-window

# Reload binding (no tmux-sensible to provide this)
bind R source-file ~/.tmux-project.conf \; display "tmux-project reloaded"

#-- Single status line matching xx4h-slim theme
set -g status on
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style 'bg=default fg=colour255'

# Left: session name (xx4h-slim: tmux_session_info bg=148 fg=234)
set -g status-left '#[fg=colour234,bg=colour148,bold] #S #[fg=colour148,bg=default]'
set -g status-left-length 30

# Right: VCS branch (xx4h-slim: vcs_branch bg=51 fg=88)
set -g status-right '#[fg=colour51,bg=default]#[fg=colour88,bg=colour51] #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") '
set -g status-right-length 50

# Window tabs — matching xx4h-slim theme
# Active: bg=colour250 fg=colour0
setw -g window-status-current-format '#[fg=colour250] #[bg=colour250,fg=colour0] #I#F  #W #[fg=colour250,bg=default] '
# Inactive: bg=colour240 fg=colour255 with activity/bell
setw -g window-status-format '#[fg=colour240,bg=default,nobold,noitalics,nounderscore]#{?window_activity_flag,#[fg=colour78],}#{?window_bell_flag,#[fg=colour197],} #[fg=colour255,bg=colour240,nobold,noitalics,nounderscore]#{?window_activity_flag,#[bg=colour78],}#{?window_bell_flag,#[bg=colour197],} #{?window_activity_flag,#[fg=colour0],}#{?window_bell_flag,#[fg=colour255],}#I#{?window_flags,#F, } #[fg=colour240,bg=default,nobold,noitalics,nounderscore]#{?window_activity_flag,#[fg=colour78],}#{?window_bell_flag,#[fg=colour197],}#[fg=colour255,bg=default] #W '

# -- configure tmux-continuum
set -g @continuum-restore 'on'

# -- configure tmux-resurrect, restore nvim sessions
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Source plugins directly (TPM hardcodes ~/.tmux.conf, which would load tmux-powerline)
run-shell '~/.tmux/plugins/tmux-sensible/sensible.tmux'
run-shell '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
run-shell '~/.tmux/plugins/tmux-continuum/continuum.tmux'
